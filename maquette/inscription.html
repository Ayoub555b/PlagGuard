<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - PlagGuard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-inscription">
  <div class="card card-inscription">
    <header class="inscription-header">
      <a href="connexion.html" class="back-link back-link-blue">←</a>
      <h1 class="inscription-logo">PlagGuard</h1>
    </header>

    <div class="shield-block">
      <div class="shield-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path fill="#2563eb" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4"/>
        </svg>
      </div>
    </div>

    <h2 class="page-title">Créer un compte</h2>
    <p class="page-subtitle">Rejoignez PlagGuard pour protéger l'originalité de vos contenus numériques.</p>

    <form onsubmit="event.preventDefault(); return false;">
      <div class="form-group">
        <label for="nom">Nom complet</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          <input type="text" id="nom" placeholder="Jean Dupont" required>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Adresse E-mail</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
          <input type="email" id="email" placeholder="exemple@mail.com" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm">Confirmer le mot de passe</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          <input type="password" id="confirm" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn-primary">S'inscrire</button>
    </form>

    <div class="separator"><span>ou s'inscrire avec</span></div>

    <button type="button" class="btn-social btn-social-full">
      <img src="https://www.google.com/favicon.ico" alt="">
      Google
    </button>

    <p class="auth-link">
      Déjà un compte ? <a href="connexion.html">Se connecter</a>
    </p>

    <p class="legal-text">
      En créant un compte, vous acceptez nos <a href="#">Conditions d'utilisation</a> et notre <a href="#">Politique de confidentialité</a>.
    </p>
  </div>
</body>
</html>
