<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réinitialisation envoyée - PlagGuard</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body {% if is_mobile %}class="is-mobile"{% endif %}>
  <div class="card">
    <header class="card-header">
      <a href="{% url 'accounts:login' %}" class="back-link">←</a>
      <h1 class="card-title">Vérifiez votre e-mail</h1>
    </header>

    <h2 class="page-title">Demande reçue</h2>
    <p class="page-subtitle">
      Si un compte correspond à l’e-mail saisi, vous recevrez rapidement un message avec un lien pour changer le mot de passe.
    </p>

    <p class="auth-link" style="margin-top: 1rem;">
      <a href="{% url 'accounts:login' %}">Retour à la connexion</a>
    </p>
  </div>
</body>
</html>
