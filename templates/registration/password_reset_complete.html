<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe changé - PlagGuard</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body {% if is_mobile %}class="is-mobile"{% endif %}>
  <div class="card">
    <header class="card-header">
      <a href="{% url 'accounts:login' %}" class="back-link">←</a>
      <h1 class="card-title">Mot de passe modifié</h1>
    </header>

    <h2 class="page-title">C’est fait</h2>
    <p class="page-subtitle">
      Votre mot de passe a été mis à jour. Vous pouvez vous connecter.
    </p>

    <p class="auth-link" style="margin-top: 1.2rem;">
      <a href="{% url 'accounts:login' %}">Aller à la connexion</a>
    </p>
  </div>
</body>
</html>
